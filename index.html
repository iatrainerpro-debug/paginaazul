<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Claudia tiene algo que confesar</title>
<meta property="og:title" content="Claudia va a pagar lo que hizo 👀">
<meta property="og:description" content="Todo el mundo va a saber lo de la página azul.">
<meta property="og:image" content="claudia-avatar.jpg">
<style>
  /* Tokens del design system real de 1MORE (src/index.css + tailwind.config) */
  :root {
    --bg-page: linear-gradient(135deg, #08082A 0%, #0d0d3d 50%, #08082A 100%);
    --bg-page-solid: #08082A;
    --bg-header: rgba(9, 9, 43, 0.9);
    --bg-surface: rgba(14, 14, 52, 0.5);
    --bg-card-hi: rgba(26, 26, 70, 0.8);
    --border-subtle: rgba(68, 69, 104, 0.2);
    --border-medium: rgba(68, 69, 104, 0.3);
    --text-primary: #ffffff;
    --text-secondary: #a8a7d1;
    --text-muted: #64648a;
    --brand-yellow: #FFD600;
    --brand-electric: #4B9EFF;
    --radius: 0.75rem;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:var(--bg-page);
    background-attachment:fixed;
    color:var(--text-primary);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column;
  }

  header {
    padding:14px 18px 12px;
    display:flex; align-items:center; gap:12px;
    background:var(--bg-header);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border-subtle);
    position:relative; z-index:5;
  }
  .avatar {
    width:46px; height:46px; border-radius:50%;
    object-fit:cover;
    border:2px solid var(--brand-electric);
    box-shadow:0 0 14px rgba(75,158,255,.35);
    flex-shrink:0;
  }
  .who { flex:1; }
  .who b { font-size:17px; font-weight:700; letter-spacing:-.02em; display:block; }
  .who span { font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:5px; }
  .who span::before {
    content:''; width:7px; height:7px; border-radius:50%;
    background:#3DFF88; box-shadow:0 0 8px #3DFF88;
  }
  .logo { height:36px; width:36px; border-radius:9px; opacity:.95; flex-shrink:0; }

  #chat {
    flex:1; overflow-y:auto;
    padding:16px 16px 150px;
    display:flex; flex-direction:column; gap:10px;
    -webkit-overflow-scrolling:touch;
  }
  .msg {
    max-width:86%;
    background:var(--bg-card-hi);
    border:1px solid var(--border-medium);
    border-radius:var(--radius);
    border-bottom-left-radius:4px;
    padding:13px 16px;
    font-size:15.5px; line-height:1.55;
    color:var(--text-primary);
    opacity:0; transform:translateY(14px);
    animation:msgIn .45s cubic-bezier(.2,.9,.3,1.2) forwards;
    box-shadow:0 4px 16px rgba(0,0,0,.25);
  }
  .msg em { font-style:normal; color:var(--text-secondary); font-size:13.5px; }
  .msg b { font-weight:700; color:#3adffa; }
  @keyframes msgIn { to { opacity:1; transform:translateY(0); } }

  .typing {
    display:inline-flex; gap:5px; padding:15px 18px;
    background:var(--bg-surface);
    border:1px solid var(--border-subtle);
    border-radius:var(--radius);
    border-bottom-left-radius:4px;
    width:fit-content;
    opacity:0; animation:msgIn .3s forwards;
  }
  .typing i {
    width:7px; height:7px; border-radius:50%; background:var(--text-secondary);
    animation:bounce 1.1s infinite;
  }
  .typing i:nth-child(2){ animation-delay:.15s; }
  .typing i:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce { 0%,60%,100%{ transform:translateY(0); opacity:.5;} 30%{ transform:translateY(-5px); opacity:1;} }

  #actions {
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    padding:14px 16px calc(16px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:10px;
    background:linear-gradient(transparent, rgba(8,8,42,.85) 45%);
  }
  .btn {
    font-family:inherit;
    font-size:16px; font-weight:600;
    padding:16px 20px; border-radius:9999px;
    border:none; cursor:pointer;
    width:100%; text-align:center;
    opacity:0; transform:translateY(16px);
    animation:msgIn .4s .1s cubic-bezier(.2,.9,.3,1.2) forwards;
    transition:transform .12s, filter .15s;
    text-decoration:none; display:block; color:inherit;
  }
  .btn:hover { filter:brightness(1.1); }
  .btn:active { transform:scale(.95); }
  /* CTA idéntico a Landing.tsx de 1more-app */
  .btn.primary {
    background:linear-gradient(135deg, #3adffa 0%, #00cbe6 100%);
    color:#004b56;
    font-weight:900;
    animation:msgIn .4s .1s cubic-bezier(.2,.9,.3,1.2) forwards, cta-pulse 2.5s ease-in-out .5s infinite;
  }
  @keyframes cta-pulse {
    0%, 100% { box-shadow:0 8px 32px rgba(58,223,250,.28); }
    50%      { box-shadow:0 8px 52px rgba(58,223,250,.6); }
  }
  .btn.ghost {
    background:rgba(34,211,238,.06);
    border:2px solid rgba(34,211,238,.4);
    color:#22D3EE;
    font-weight:700;
    animation-delay:.22s;
  }
  .btn.small {
    font-size:14px; padding:12px 16px;
    background:rgba(34,211,238,.06);
    border:2px solid rgba(34,211,238,.4);
    color:#22D3EE;
  }
  .btn.share {
    background:#25D366; color:#07330f; font-weight:800;
    animation-delay:.34s;
  }

  .footer-note {
    text-align:center; font-size:10.5px; color:var(--text-muted);
    padding:6px 0 2px;
  }
</style>
</head>

<div id="chat" aria-live="polite"></div>

<div id="actions"></div>

<div class="footer-note">campaña 1MORE · sin vecinos espiados en el proceso</div>

<script>
// ponytail: flujo lineal con setTimeout; máquina de estados si el guion crece
const APP_STORE_URL = 'https://www.1more-app.com';
const chat = document.getElementById('chat');
const actions = document.getElementById('actions');

const wait = ms => new Promise(r => setTimeout(r, ms));

function addMsg(html) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = html;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

async function typingThen(html, typeMs = 1100) {
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<i></i><i></i><i></i>';
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
  await wait(typeMs);
  t.remove();
  addMsg(html);
}

function setActions(buttons) {
  actions.innerHTML = '';
  buttons.forEach(b => {
    const el = document.createElement(b.href ? 'a' : 'button');
    el.className = 'btn ' + b.style;
    el.textContent = b.label;
    if (b.href) { el.href = b.href; el.target = '_blank'; el.rel = 'noopener'; }
    if (b.onClick) el.addEventListener('click', b.onClick);
    actions.appendChild(el);
  });
}

async function start() {
  await wait(500);
  await typingThen(
    `Uy. Así que viste el cartel de mi ex... 👀`,
    1200
  );
  await typingThen(
    `Vale, lo confieso 😏<br>
     Sí, uso la página azul... <b>para entrenar</b>.<br>
     Mi ex entrenador se puso celoso porque lo despedí por <b>Max</b>, el entrenador de 1MORE. <em>(la verdadera página azul, por si no lo pillaste)</em>`,
    1400
  );
  await typingThen(
    `¿Lo dejamos aquí, o te cuento qué es 1More y te regalo <b>7 días gratis</b> para probarlo?`,
    1100
  );
  setActions([
    { label: '🔵🎁 Sí, cuéntamelo todo', style: 'primary', onClick: routeAll },
    { label: '😏 Solo quería el chisme', style: 'ghost', onClick: routeGossip },
  ]);
}

async function routeAll() {
  actions.innerHTML = '';
  await typingThen(
    `1More es tu app de entrenamiento con IA. <b>Max</b> te corrige la forma en tiempo real con la cámara y te resuelve las dudas al instante — sin esperar a que tenga que terminar su vida antes de contestarte. <b>Tú eres su única prioridad.</b>`,
    1300
  );
  await typingThen(
    `Plan de entrenamiento y nutrición en minutos, 100% adaptado a tu contexto y objetivo.<br><br>
     Toma <b>7 días gratis</b>. Sin excusas esta vez. 👇`,
    1100
  );
  setActions([
    { label: '💪 Empezar mis 7 días gratis', style: 'primary', href: APP_STORE_URL },
    shareButton(),
  ]);
}

async function routeGossip() {
  actions.innerHTML = '';
  await typingThen(
    `Justo. Y ya te vas con la mejor parte 😏<br>
     Si algún día quieres entrenar de verdad <em>(no solo cotillear)</em>, aquí estaré.`,
    1000
  );
  setActions([
    shareButton(),
    { label: 'Ver 1More igualmente', style: 'small', href: APP_STORE_URL },
  ]);
  actions.querySelector('.small').style.animation = 'msgIn .4s .3s forwards';
}

function shareButton() {
  const text = 'Claudia va a pagar lo que hizo 👀 Todo el mundo va a saber lo de la página azul: ' + location.href;
  return {
    label: '📲 Mándaselo a quien le pueda venir bien la página azul',
    style: 'share',
    href: 'https://wa.me/?text=' + encodeURIComponent(text),
  };
}

start();
</script>
